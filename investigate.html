<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investigate — Pump Justice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="page-content with-stats">
  <div class="container">
    <div class="section-label">Submit a Contract Address</div>
    <div class="section-title">Run an Investigation</div>
    <div class="section-desc">Paste any Solana contract address. Six autonomous agents will analyze it in real-time.</div>

    <div class="tool-box">
      <div class="input-row">
        <input type="text" id="caInput" placeholder="Paste a Solana contract address..." spellcheck="false" maxlength="64">
        <button class="btn" id="submitBtn" onclick="submitCA()">🔍 Investigate</button>
      </div>
    </div>

    <!-- Active investigation -->
    <div id="activeInv" style="display:none">
      <h3 style="color:#fff;font-weight:700;margin-bottom:16px">
        <span id="activeToken">Investigating...</span>
        <span id="activeBadge" class="badge investigating" style="margin-left:10px">INVESTIGATING</span>
      </h3>
      <div id="liveFeed"></div>

      <!-- Report section (after complete) -->
      <div id="reportSection" style="display:none;margin-top:24px">
        <div style="margin-bottom:16px">
          <button class="vote-btn" id="voteUp" onclick="vote('up')">▲ <span id="upCount">0</span></button>
          <button class="vote-btn" id="voteDown" onclick="vote('down')">▼ <span id="downCount">0</span></button>
        </div>

        <div class="comment-section">
          <h4 style="color:#fff;font-weight:600;margin-bottom:12px">Comments</h4>
          <div class="comment-form">
            <div class="row">
              <input type="text" id="commentName" placeholder="Name (optional)" style="max-width:200px">
              <input type="text" id="commentContent" placeholder="Add a comment..." style="flex:1">
              <button class="btn btn-sm" onclick="postComment()">Post</button>
            </div>
          </div>
          <div id="commentsList"></div>
        </div>
      </div>
    </div>

    <!-- Recent feed -->
    <div id="recentSection">
      <h3 style="color:#fff;font-weight:600;margin-bottom:16px">Recent Agent Activity</h3>
      <div id="feedContainer"><div class="empty">No agent activity yet. Submit a CA to start.</div></div>
    </div>
  </div>
</div>

<script src="/shared.js"></script>
<script>
initPage('investigate');

let currentInvId = null;
let pollTimer = null;

async function submitCA() {
  const ca = document.getElementById('caInput').value.trim();
  if (!ca || ca.length < 32) return;
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'Deploying agents...';
  try {
    const res = await fetch(API + '/api/investigate', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ca}) });
    const data = await res.json();
    if (data.error) { alert(data.error); return; }
    currentInvId = data.id;
    document.getElementById('activeInv').style.display = 'block';
    document.getElementById('reportSection').style.display = 'none';
    document.getElementById('liveFeed').innerHTML = '';
    pollInvestigation();
  } catch(e) { alert('Server unavailable'); }
  finally { setTimeout(() => { btn.disabled = false; btn.textContent = '🔍 Investigate'; }, 5000); }
}

async function pollInvestigation() {
  if (!currentInvId) return;
  try {
    const res = await fetch(API + '/api/investigation/' + currentInvId);
    const d = await res.json();
    
    document.getElementById('activeToken').textContent = 
      d.token_name ? `${d.token_name} ($${d.token_symbol})` : 'Investigating...';
    
    const badge = document.getElementById('activeBadge');
    badge.textContent = d.risk_rating || d.status.toUpperCase();
    badge.className = 'badge ' + (d.risk_rating || d.status);

    document.getElementById('liveFeed').innerHTML = (d.steps || []).map(s => `
      <div class="step-card">
        <div class="step-top">
          <span class="step-agent" style="color:${agentColors[s.agent_name]||'#fff'}">${s.agent_name}</span>
          <span class="step-time">${timeAgo(s.created_at)}</span>
        </div>
        <div class="step-body">${esc(s.content)}</div>
      </div>
    `).join('');

    if (d.status === 'complete') {
      document.getElementById('reportSection').style.display = 'block';
      document.getElementById('upCount').textContent = d.upvotes || 0;
      document.getElementById('downCount').textContent = d.downvotes || 0;
      loadComments();
      loadStats();
    } else {
      pollTimer = setTimeout(pollInvestigation, 2500);
    }
  } catch(e) { pollTimer = setTimeout(pollInvestigation, 5000); }
}

async function vote(type) {
  if (!currentInvId) return;
  try {
    const res = await fetch(API + '/api/vote/' + currentInvId, {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({type})
    });
    const d = await res.json();
    document.getElementById('upCount').textContent = d.upvotes || 0;
    document.getElementById('downCount').textContent = d.downvotes || 0;
  } catch(e) {}
}

async function loadComments() {
  if (!currentInvId) return;
  try {
    const res = await fetch(API + '/api/comments/' + currentInvId);
    const comments = await res.json();
    const el = document.getElementById('commentsList');
    if (!comments.length) { el.innerHTML = '<div class="empty">No comments yet. Be the first.</div>'; return; }
    el.innerHTML = comments.map(c => `
      <div class="comment-item">
        <div class="comment-header">
          <span class="comment-author">${esc(c.author_name)}</span>
          <span class="comment-time">${timeAgo(c.created_at)}</span>
        </div>
        <div class="comment-body">${esc(c.content)}</div>
      </div>
    `).join('');
  } catch(e) {}
}

async function postComment() {
  if (!currentInvId) return;
  const content = document.getElementById('commentContent').value.trim();
  if (!content) return;
  const author_name = document.getElementById('commentName').value.trim();
  try {
    await fetch(API + '/api/comment/' + currentInvId, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ content, author_name })
    });
    document.getElementById('commentContent').value = '';
    loadComments();
    loadStats();
  } catch(e) {}
}

async function loadRecentFeed() {
  try {
    const res = await fetch(API + '/api/feed');
    const steps = await res.json();
    const el = document.getElementById('feedContainer');
    if (!steps.length) { el.innerHTML = '<div class="empty">No agent activity yet. Submit a CA to start.</div>'; return; }
    el.innerHTML = steps.slice(0, 20).map(s => `<div class="feed-item">
      <span class="feed-time">${timeAgo(s.created_at)}</span>
      <span class="feed-agent" style="color:${agentColors[s.agent_name]||'#fff'}">${s.agent_name}</span>
      <span class="feed-content">${esc(s.content.length > 200 ? s.content.slice(0,200)+'…' : s.content)}</span>
    </div>`).join('');
  } catch(e) {}
}

document.getElementById('caInput').addEventListener('keydown', e => { if(e.key==='Enter') submitCA(); });
loadRecentFeed();
setInterval(loadRecentFeed, 15000);

// Check URL params
const params = new URLSearchParams(window.location.search);
if (params.get('id')) {
  currentInvId = parseInt(params.get('id'));
  document.getElementById('activeInv').style.display = 'block';
  pollInvestigation();
}
</script>
</body>
</html>
